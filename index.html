<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Space Snake</title>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="game-container">
        <div class="header">
            <h1>SPACE SNAKE</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                    <span class="speed-indicator" id="foodCount"></span>
                </div>
                <div class="score-item">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <p id="gameOver" class="game-over hidden">GAME OVER!</p>
            <button id="startBtn" class="btn">START GAME</button>
            <p class="instructions">Use ARROW KEYS or WASD to control</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
